// ---- UTILS ----
function todayStr(){const n=new Date();return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0");}
function currentMonth(){return new Date().getMonth();}
function parseDate(s){const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);}
function toDS(y,m,d){return y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");}
function daysUntil(t){const td=parseDate(t),n=new Date();n.setHours(0,0,0,0);td.setHours(0,0,0,0);return Math.ceil((td-n)/864e5);}
function dim(y,m){return new Date(y,m+1,0).getDate();}
function off(y,m){return(new Date(y,m,1).getDay()+6)%7;}

function getSaisonPhase(ds){
  const d=parseDate(ds);
  for(const p of PHASES){if(d>=parseDate(p.start)&&d<=parseDate(p.end))return p;}
  return null;
}
function getMesozyklus(ds){
  const anchor=parseDate("2026-01-05");
  const d=parseDate(ds);
  const days=Math.max(0,Math.floor((d-anchor)/864e5));
  const w=Math.floor(days/7)%4;
  return{week:w+1,name:MESO_NAMES[w],sub:MESO_SUBS[w],color:MESO_COLORS[w]};
}

function gh(ds){const d=parseDate(ds);for(const h of SH){if(d>=parseDate(h.start)&&d<=parseDate(h.end))return h;}return null;}
function gt(ds){
  const hol=gh(ds);
  if(hol){const diff=Math.round((parseDate(ds)-parseDate(hol.start))/864e5);return VP[diff%VP.length];}
  return WT[parseDate(ds).getDay()]||null;
}

function exportData(name){
  const data={version:"vi2026_v6",name:name,logs:loadLogs(),prs:loadPRs(),exportDate:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="imperials-training-"+name.toLowerCase().replace(/\s+/g,"-")+"-"+new Date().toISOString().slice(0,10)+".json";
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  localStorage.setItem(SK+"_lastbackup",new Date().toISOString());
}
function importData(file,onDone){
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.logs){saveLogs(data.logs);}
      if(data.prs){savePRs(data.prs);}
      if(data.name){saveName(data.name);}
      onDone(data.name||"");
    }catch(err){alert("Fehler beim Importieren. Ist das die richtige JSON-Datei?");}
  };
  reader.readAsText(file);
}

function getExInfo(task){
  const t=task.replace(/\[TB\]\s*/,'').toLowerCase();
  for(const ex of EX_DB){
    if(ex.match.some(m=>t.includes(m.toLowerCase())))return ex;
  }
  return null;
}

function TaskRow({task,done,onToggle}){
  const[showEx,setShowEx]=useState(false);
  const isBand=task.startsWith("[TB]");
  const info=getExInfo(task);
  return(
    <>
      <div style={{display:"flex",alignItems:"flex-start",gap:8,padding:"9px 10px",marginBottom:3,borderRadius:9,
        background:done?(isBand?BL+"30":OR+"15"):isBand?BL+"10":CA,
        border:"1px solid "+(done?(isBand?BLL+"88":OR+"55"):isBand?BL+"44":BO)}}>
        <div onClick={onToggle} style={{width:18,height:18,borderRadius:5,border:"2px solid "+(done?(isBand?BLL:OR):isBand?BLL:"#2A3060"),
          background:done?(isBand?BLL:OR):"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1,cursor:"pointer",transition:"all 0.15s"}}>
          {done&&<span style={{color:"#fff",fontSize:9,fontWeight:800}}>✓</span>}
        </div>
        <span onClick={onToggle} style={{fontSize:11.5,color:done?MU:isBand?BLL:TX,textDecoration:done?"line-through":"none",lineHeight:1.4,flex:1,cursor:"pointer"}}>{task}</span>
        {info&&(
          <button onClick={e=>{e.stopPropagation();setShowEx(true);}}
            style={{width:20,height:20,borderRadius:"50%",background:done?"transparent":OR+"22",border:"1px solid "+(done?BO:OR+"55"),color:done?MU:OR,fontSize:10,fontWeight:700,cursor:"pointer",flexShrink:0,lineHeight:1,marginTop:1,display:"flex",alignItems:"center",justifyContent:"center"}}>

}

function TodayTab({logs,setLogs,user}){
  const[infoEx,setInfoEx]=useState(null);
  const TODAY=todayStr();
  const t=gt(TODAY);
  const mine=new Set(logs[TODAY]||[]);
  const color=t?.color||BL;

  const toggle=(i)=>{
    const s=new Set(logs[TODAY]||[]);s.has(i)?s.delete(i):s.add(i);
    const nl={...logs,[TODAY]:[...s]};setLogs(nl);saveLogs(nl);
  };
  const markAll=()=>{
    if(!t)return;
    const nl={...logs,[TODAY]:Array.from({length:t.tasks.length},(_,i)=>i)};setLogs(nl);saveLogs(nl);
  };
  const unmark=()=>{const nl={...logs,[TODAY]:[]};setLogs(nl);saveLogs(nl);};

  // Weekly overview
  const week=Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(6-i));

    const tw=gt(ds);const done=tw?.tasks&&(logs[ds]||[]).length===tw.tasks.length;
    return{ds,dayIdx:(d.getDay()+6)%7,t:tw,done,isToday:ds===TODAY};

  return(
    <div style={{padding:"12px 14px 80px"}}>
      <Countdown/>
      <PhaseBadge ds={TODAY}/>

      {t?(
        <div style={{background:color+"18",border:"1.5px solid "+color+"55",borderRadius:14,marginBottom:14,overflow:"hidden"}}>
          <div style={{background:color+"33",padding:"12px 14px",borderBottom:"1px solid "+color+"33"}}>
            <div style={{fontFamily:"'Bebas Neue'",fontSize:8,color:color,letterSpacing:"0.25em",opacity:.8}}>HEUTE · {DN[new Date().getDay()].toUpperCase()}</div>
            <div style={{fontFamily:"'Bebas Neue'",fontSize:20,color:TX,marginTop:1}}>{t.label}</div>

            {t.band&&<div style={{fontSize:10,color:BLL,marginTop:2}}>[TB] D1 Terraband J-Band Protokoll enthalten</div>}
            <div style={{marginTop:8,height:3,background:"rgba(0,0,0,0.3)",borderRadius:2,overflow:"hidden"}}>
              <div style={{height:"100%",width:t.tasks.length?`${mine.size/t.tasks.length*100}%`:"0%",background:color,transition:"width 0.3s",borderRadius:2}}/>
            </div>
            <div style={{fontSize:10,color:MU,marginTop:4}}>{mine.size}/{t.tasks.length} Aufgaben · {t.tasks.filter(x=>x.startsWith("[TB]")).length} Terraband</div>
          </div>
          <div style={{padding:"10px 12px"}}>
            {t.tasks.map((task,i)=><TaskRow key={i} task={task} done={mine.has(i)} onToggle={()=>toggle(i)}/>)}
            <div style={{display:"flex",gap:8,marginTop:10}}>
              {mine.size===t.tasks.length?(
                <>
                  <div style={{flex:1,padding:11,background:"linear-gradient(135deg,"+color+","+ORL+")",borderRadius:10,textAlign:"center",fontFamily:"'Bebas Neue'",fontSize:16,color:"#fff",letterSpacing:"0.05em"}}>♔ TAG ABGESCHLOSSEN!</div>
                  <button onClick={unmark} style={{padding:"11px 14px",background:CA,border:"1px solid "+BO,borderRadius:10,color:MU,fontSize:11,cursor:"pointer"}}>Reset</button>

              ):(
                <button onClick={markAll} style={{flex:1,padding:11,background:CA,border:"1px solid "+BO,borderRadius:10,color:MU,fontFamily:"'Bebas Neue'",fontSize:12,letterSpacing:"0.08em",cursor:"pointer"}}>ALLE ABHAKEN →</button>
              )}

          </div>

        <div style={{background:CA,borderRadius:14,padding:24,textAlign:"center",marginBottom:14,border:"1px solid "+BO}}>

function CalendarTab({logs,setLogs}){
  const[infoEx,setInfoEx]=useState(null);
  const[month,setMonth]=useState(currentMonth());
  const[sel,setSel]=useState(null);
  const TODAY=todayStr(),Y=2026;

  const getTasks=(ds)=>new Set(logs[ds]||[]);
  const toggle=(ds,i)=>{const s=getTasks(ds);s.has(i)?s.delete(i):s.add(i);const nl={...logs,[ds]:[...s]};setLogs(nl);saveLogs(nl);};
  const markAll=(ds,n)=>{const nl={...logs,[ds]:Array.from({length:n},(_,i)=>i)};setLogs(nl);saveLogs(nl);};
  const unmarkAll=(ds)=>{const nl={...logs,[ds]:[]};setLogs(nl);saveLogs(nl);};

  const dM=dim(Y,month),of=off(Y,month);
  const cells=[...Array(of).fill(null),...Array.from({length:dM},(_,i)=>i+1)];

  const vP=Object.entries(PH).filter(([k])=>k.startsWith(`${Y}-${String(month+1).padStart(2,"0")}`));
  const vS=Object.entries(SE).filter(([k])=>k.startsWith(`${Y}-${String(month+1).padStart(2,"0")}`));

          <div style={{fontFamily:"'Bebas Neue'",fontSize:24,color:TX}}>{MN[month]}</div>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:9,color:MU,letterSpacing:"0.18em"}}>2026 · {dn}/{tot} done</div>

      </div>
      <div style={{height:3,background:BO,borderRadius:2,overflow:"hidden",marginBottom:10}}>
        <div style={{height:"100%",width:tot?`${dn/tot*100}%`:"0%",background:"linear-gradient(90deg,"+BL+","+OR+")",borderRadius:2}}/>

      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:3}}>

      {sel&&(
        <div onClick={()=>setSel(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",backdropFilter:"blur(8px)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100}}>
          <div onClick={e=>e.stopPropagation()} style={{background:DA,borderRadius:"22px 22px 0 0",width:"100%",maxWidth:500,maxHeight:"88vh",overflowY:"auto",paddingBottom:40}}>
            <div style={{borderTop:"3px solid "+(sT?.color||MU),borderRadius:"22px 22px 0 0",padding:"14px 16px 10px",position:"sticky",top:0,background:DA,borderBottom:"1px solid "+BO,zIndex:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"'Bebas Neue'",fontSize:9,color:MU,letterSpacing:"0.22em"}}>{DN[parseDate(sel).getDay()].toUpperCase()} · {sel.slice(8)}.{sel.slice(5,7)}.2026</div>
                  <div style={{fontFamily:"'Bebas Neue'",fontSize:19,color:sT?.color||MU,marginTop:2}}>{sT?sT.label:sPub||"Ruhetag"}</div>
                  {sT?.zeit&&<div style={{fontSize:10,color:MU,marginTop:2}}>{sT.zeit}</div>}
                  {sH&&<div style={{fontSize:10,color:sH.color,marginTop:2}}>{sH.name} – Ferientraining</div>}
                  {sSp&&<div style={{fontSize:10,color:"#9A4A9A",marginTop:2}}>{sSp}</div>}
                  <PhaseBadge ds={sel}/>
                </div>
                <button onClick={()=>setSel(null)} style={{background:CA,border:"none",color:MU,borderRadius:"50%",width:28,height:28,fontSize:15,cursor:"pointer"}}>×</button>
              </div>
              {sT?.tasks&&<div style={{height:3,background:BO,borderRadius:2,overflow:"hidden",marginTop:6}}><div style={{height:"100%",width:`${sSet.size/sT.tasks.length*100}%`,background:"linear-gradient(90deg,"+(sT?.color||BL)+","+ORL+")",borderRadius:2}}/></div>}
            </div>
            <div style={{padding:"12px 14px 0"}}>
              {sT?.tasks?(
                <>
                  {sT.tasks.map((task,i)=><TaskRow key={i} task={task} done={sSet.has(i)} onToggle={()=>toggle(sel,i)} onInfo={setInfoEx}/>)}
                  <div style={{display:"flex",gap:8,marginTop:10}}>
                    {sSet.size===sT.tasks.length?(
                      <>
                        <div style={{flex:1,padding:11,background:"linear-gradient(135deg,"+(sT?.color||OR)+","+ORL+")",borderRadius:10,textAlign:"center",fontFamily:"'Bebas Neue'",fontSize:15,color:"#fff"}}>♔ TAG DONE!</div>
                        <button onClick={()=>unmarkAll(sel)} style={{padding:"11px 14px",background:CA,border:"1px solid "+BO,borderRadius:10,color:MU,fontSize:11,cursor:"pointer"}}>Reset</button>
                      </>
                    ):(
                      <button onClick={()=>markAll(sel,sT.tasks.length)} style={{flex:1,padding:11,background:CA,border:"1px solid "+BO,borderRadius:10,color:MU,fontFamily:"'Bebas Neue'",fontSize:13,cursor:"pointer"}}>ALLE ABHAKEN →</button>
                    )}
                  </div>
                </>
              ):(
                <div style={{textAlign:"center",padding:"28px 0"}}>
                  <div style={{fontFamily:"'Bebas Neue'",fontSize:16,color:MU}}>{sPub?sPub+" – Feiertag":"Ruhetag – Active Recovery"}</div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ---- STATS TAB ----
function StatsTab({logs,user}){
  const[prs,setPRs]=useState(loadPRs);
  const[showAdd,setShowAdd]=useState(false);
  const[metric,setMetric]=useState("tdrill");
  const[val,setVal]=useState("");
  const TODAY=todayStr();

  const addPR=()=>{
    if(!val)return;
    const m=PR_METRICS.find(x=>x.key===metric);
    const np=[{metric:m.key,value:parseFloat(val),unit:m.unit,date:TODAY},...prs];
    setPRs(np);savePRs(np);setVal("");setShowAdd(false);
  };

  // Streak
  let streak=0;
  for(let i=0;i<365;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    const tw=gt(ds);
    if(!tw?.tasks)continue;
    if((logs[ds]||[]).length===tw.tasks.length){streak++;}
    else if(i>0){break;}
  }

  // Monthly
  const months=MN.map((n,m)=>{
    let dn=0,tot=0;
    for(let d=1;d<=dim(2026,m);d++){const ds=toDS(2026,m,d),tw=gt(ds);if(tw?.tasks){tot++;if((logs[ds]||[]).length===tw.tasks.length)dn++;}}
    return{n:n.slice(0,3),pct:tot?Math.round(dn/tot*100):0,dn,tot};
  });

  // Weekly
  let wDone=0,wTot=0;
  for(let i=0;i<7;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    const tw=gt(ds);if(tw?.tasks){wTot++;if((logs[ds]||[]).length===tw.tasks.length)wDone++;}
  }
  const avgPct=months.reduce((a,m)=>a+m.pct,0)/12;
  const wPct=wTot?wDone/wTot*100:0;
  const score=Math.round(Math.min(100,streak*2.5)*0.4+avgPct*0.4+wPct*0.2);

  const bestPRs=PR_METRICS.map(m=>{
    const mine=prs.filter(p=>p.metric===m.key);
    if(!mine.length)return{...m,best:null};
    const best=m.lower?mine.reduce((a,b)=>a.value<b.value?a:b):mine.reduce((a,b)=>a.value>b.value?a:b);
    return{...m,best};
  });

  const phase=getSaisonPhase(TODAY);
  const meso=getMesozyklus(TODAY);

  return(
    <div style={{padding:"12px 14px 80px"}}>
      {/* Imperial Score */}
      <div style={{background:"linear-gradient(135deg,"+BL+"88,"+OR+"88)",borderRadius:14,padding:"16px 18px",marginBottom:14,border:"1px solid "+OR+"44"}}>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:10,color:"rgba(255,255,255,0.7)",letterSpacing:"0.3em",marginBottom:2}}>IMPERIAL SCORE · {user.toUpperCase()}</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:12,marginBottom:10}}>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:60,color:"#fff",lineHeight:1}}>{score}</div>
          <div style={{paddingBottom:8}}>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.8)"}}>/ 100</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.65)",fontWeight:600}}>{score>=80?"ELITE":score>=60?"STARK":score>=40?"AUFBAU":"BEGINN"}</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
          {[{l:"Streak",v:streak+" Tage"},{l:"Woche",v:wDone+"/"+wTot},{l:"Saison Ø",v:Math.round(avgPct)+"%"}].map(x=>(
            <div key={x.l} style={{background:"rgba(255,255,255,0.12)",borderRadius:8,padding:"7px 10px"}}>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.6)"}}>{x.l}</div>
              <div style={{fontFamily:"'Bebas Neue'",fontSize:18,color:"#fff"}}>{x.v}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Current phase + meso */}
      {(phase||meso)&&(
        <div style={{background:CA,borderRadius:12,padding:"12px 14px",marginBottom:14,border:"1px solid "+BO}}>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:10,color:MU,letterSpacing:"0.18em",marginBottom:8}}>AKTUELLE TRAININGSPHASE</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {phase&&<div style={{background:phase.color+"18",border:"1px solid "+phase.color+"44",borderRadius:9,padding:"9px 12px"}}>
              <div style={{fontFamily:"'Bebas Neue'",fontSize:10,color:phase.color,letterSpacing:"0.15em"}}>{phase.name}</div>
              <div style={{fontSize:11,color:MU,marginTop:2,lineHeight:1.4}}>{phase.sub}</div>
            </div>}
            <div style={{background:meso.color+"18",border:"1px solid "+meso.color+"44",borderRadius:9,padding:"9px 12px"}}>
              <div style={{fontFamily:"'Bebas Neue'",fontSize:10,color:meso.color,letterSpacing:"0.15em"}}>WOCHE {meso.week}: {meso.name}</div>
              <div style={{fontSize:11,color:MU,marginTop:2,lineHeight:1.4}}>{meso.sub}</div>
            </div>
          </div>
        </div>
      )}

      {/* Monthly chart */}
      <div style={{background:CA,borderRadius:14,padding:"12px 14px",marginBottom:14,border:"1px solid "+BO}}>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:10,color:MU,letterSpacing:"0.2em",marginBottom:10}}>MONATSÜBERSICHT 2026</div>
        <div style={{display:"flex",gap:3,alignItems:"flex-end",height:64}}>
          {months.map((m,i)=>{
            const h=Math.max(2,m.pct*0.62);
            const isCur=i===currentMonth();
            return(
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                <div style={{width:"100%",height:h+"px",background:isCur?OR:m.pct>0?BL:BO,borderRadius:"2px 2px 0 0",transition:"height 0.3s",position:"relative"}}>
                  {m.pct>0&&<div style={{position:"absolute",top:-14,left:"50%",transform:"translateX(-50%)",fontFamily:"'Bebas Neue'",fontSize:7,color:isCur?ORL:MU,whiteSpace:"nowrap"}}>{m.pct}%</div>}
                </div>
                <div style={{fontFamily:"'Bebas Neue'",fontSize:7,color:isCur?ORL:MU}}>{m.n}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* PRs */}
      <div style={{background:CA,borderRadius:14,padding:"12px 14px",border:"1px solid "+BO}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:10,color:MU,letterSpacing:"0.2em"}}>PERSONAL RECORDS</div>
          <button onClick={()=>setShowAdd(!showAdd)} style={{background:showAdd?OR+"22":BL+"22",border:"1px solid "+(showAdd?OR:BL)+"55",borderRadius:8,padding:"5px 10px",color:showAdd?ORL:BLL,fontFamily:"'Bebas Neue'",fontSize:10,cursor:"pointer"}}>
            {showAdd?"ABBRECHEN":"+ PR"}
          </button>
        </div>
        {showAdd&&(
          <div style={{background:DA,borderRadius:10,padding:"12px",marginBottom:12,border:"1px solid "+BO}}>
            <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
              {PR_METRICS.map(m=>(
                <button key={m.key} onClick={()=>setMetric(m.key)} style={{padding:"5px 10px",background:metric===m.key?BL:"transparent",border:"1px solid "+(metric===m.key?BLL:BO),borderRadius:7,color:metric===m.key?TX:MU,fontSize:11,cursor:"pointer"}}>{m.label}</button>
              ))}
            </div>
            {PR_METRICS.find(m=>m.key===metric)&&(
              <div style={{fontSize:10,color:MU,marginBottom:8}}>
                Ziel: <span style={{color:OR}}>{PR_METRICS.find(m=>m.key===metric).target}</span> · D1: <span style={{color:BLL}}>{PR_METRICS.find(m=>m.key===metric).d1}</span>
              </div>
            )}
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <input value={val} onChange={e=>setVal(e.target.value)} type="number" step="0.01" placeholder="Wert"
                style={{flex:1,background:CA,border:"1.5px solid "+BO,borderRadius:8,padding:"9px 12px",color:TX,fontSize:13,fontFamily:"'DM Sans'",outline:"none"}}/>
              <div style={{display:"flex",alignItems:"center",background:CA,border:"1px solid "+BO,borderRadius:8,padding:"9px 12px",fontSize:12,color:MU,minWidth:44}}>
                {PR_METRICS.find(m=>m.key===metric)?.unit||""}
              </div>
            </div>
            <button onClick={addPR} disabled={!val} style={{width:"100%",padding:"9px 0",background:val?OR:"#333",border:"none",borderRadius:9,color:"#fff",fontFamily:"'Bebas Neue'",fontSize:13,cursor:val?"pointer":"not-allowed"}}>
              PR SPEICHERN
            </button>
          </div>
        )}
        {bestPRs.map(m=>(
          <div key={m.key} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid "+BO}}>
            <div>
              <div style={{fontSize:12,color:TX,fontWeight:500}}>{m.label}</div>
              <div style={{fontSize:10,color:MU,marginTop:1}}>Ziel: {m.target} · D1: {m.d1}</div>
              {m.best&&<div style={{fontSize:9,color:MU,marginTop:1}}>{m.best.date}</div>}
            </div>
            <div style={{textAlign:"right"}}>
              {m.best?<div style={{fontFamily:"'Bebas Neue'",fontSize:22,color:OR}}>{m.best.value}<span style={{fontSize:11,color:MU}}> {m.unit}</span></div>:<div style={{fontSize:11,color:MU}}>kein PR</div>}
            </div>
          </div>
        ))}
      </div>

      {/* Data Management */}
      <div style={{background:CA,borderRadius:14,padding:"12px 14px",border:"1px solid "+BO,marginTop:14}}>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:10,color:MU,letterSpacing:"0.2em",marginBottom:10}}>DATENVERWALTUNG</div>
        <div style={{fontSize:11,color:MU,marginBottom:12,lineHeight:1.5}}>
          Daten leben im Browser-Speicher. Exportiere regelmäßig als Backup – besonders vor Browser-Updates oder Gerätewechsel.
          {loadLastBackup()&&<span style={{color:"#4ADE80"}}> Letztes Backup: {new Date(loadLastBackup()).toLocaleDateString("de-AT")}.</span>}
        </div>
        <button onClick={()=>exportData(user)}
          style={{width:"100%",padding:"12px 0",background:"linear-gradient(135deg,"+BL+","+BLL+")",border:"none",borderRadius:10,color:"#fff",fontFamily:"'Bebas Neue'",fontSize:14,letterSpacing:"0.1em",cursor:"pointer",marginBottom:8}}>
          TRAININGSDATEN EXPORTIEREN (JSON)
        </button>
        <label style={{display:"block",width:"100%",padding:"11px 0",background:CA,border:"1px solid "+BO,borderRadius:10,color:MU,fontFamily:"'Bebas Neue'",fontSize:13,letterSpacing:"0.08em",textAlign:"center",cursor:"pointer"}}>
          BACKUP IMPORTIEREN
          <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)importData(f,(n)=>{alert("Backup erfolgreich importiert! App wird neu geladen.");window.location.reload();});}}/>
        </label>
        <div style={{fontSize:10,color:MU,marginTop:10,lineHeight:1.5}}>
          Die JSON-Datei enthält alle Trainings-Checks und Personal Records. Speichere sie in deiner Cloud (iCloud, Google Drive) für maximale Sicherheit.
        </div>
      </div>
    </div>
  );
}

// ---- ROOT APP ----
function App(){
  const[user,setUser]=useState(()=>loadName()||"");
  const[tab,setTab]=useState("heute");
  const[logs,setLogs]=useState(()=>loadLogs());

  if(!user)return<NameScreen onStart={setUser}/>;

  const tabs=[{id:"heute",label:"HEUTE"},{id:"kalender",label:"KALENDER"},{id:"stats",label:"STATS"}];

  return(
    <div style={{background:BK,minHeight:"100vh",color:TX,fontFamily:"'DM Sans',sans-serif",maxWidth:500,margin:"0 auto"}}>
      <div style={{background:DA,borderBottom:"2px solid "+BL+"66",padding:"11px 14px 9px",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:38,height:38,borderRadius:9,background:CA,border:"1.5px solid "+OR+"55",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",flexShrink:0}}>
            <img src={LOGO_SM} style={{width:36,height:36,objectFit:"contain"}}
              onError={e=>{e.target.style.display="none";e.target.parentNode.innerHTML='<div style="font-size:22px;color:#E8520A">♔</div>';}} alt="VI"/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Bebas Neue'",fontSize:8,letterSpacing:"0.3em",color:OR}}>VIENNA IMPERIALS · COACH APP</div>
            <div style={{fontFamily:"'Bebas Neue'",fontSize:17,color:TX}}>TRAININGSKALENDER 2026</div>
          </div>
          <button onClick={()=>{saveName("");setUser("");}} style={{background:CA,border:"1px solid "+BO,borderRadius:9,padding:"5px 10px",cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:24,height:24,borderRadius:"50%",background:BL,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Bebas Neue'",fontSize:11,color:"#fff"}}>{user[0]?.toUpperCase()}</div>
            <div style={{fontFamily:"'Bebas Neue'",fontSize:9,color:OR,letterSpacing:"0.08em"}}>{user}</div>
          </button>
        </div>
      </div>

      {tab==="heute"&&<TodayTab logs={logs} setLogs={setLogs} user={user}/>}
      {tab==="kalender"&&<CalendarTab logs={logs} setLogs={setLogs}/>}
      {tab==="stats"&&<StatsTab logs={logs} user={user}/>}

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:500,background:DA,borderTop:"2px solid "+BO,zIndex:50,display:"flex"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 0 12px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <div style={{width:3,height:3,borderRadius:"50%",background:tab===t.id?OR:"transparent",marginBottom:2}}/>
            <div style={{fontFamily:"'Bebas Neue'",fontSize:10,letterSpacing:"0.12em",color:tab===t.id?OR:MU}}>{t.label}</div>
          </button>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);


</script>
</body>
</html>
