var root = document.getElementById("root");

function h(tag, props, children) {
  var e = document.createElement(tag);
  if (props) Object.keys(props).forEach(function(k) {
    if (k === "style" && typeof props[k] === "object") {
      Object.assign(e.style, props[k]);
    } else if (k === "className") {
      e.className = props[k];
    } else if (k.slice(0,2) === "on") {
      e.addEventListener(k.slice(2).toLowerCase(), props[k]);
    } else {
      e.setAttribute(k, props[k]);
    }
  });
  if (children !== undefined && children !== null) {
    [].concat(children).forEach(function(c) {
      if (c === null || c === undefined) return;
      e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
    });
  }
  return e;
}

function div(style, children) { return h("div", {style: style}, children); }
function span(style, txt) { return h("span", {style: style}, [txt]); }
function btn(style, txt, onclick) {
  var b = h("button", {style: Object.assign({cursor:"pointer",border:"none",fontFamily:"inherit"}, style)});
  b.textContent = txt;
  b.addEventListener("click", onclick);
  return b;
}

function render() {
  root.innerHTML = "";
  if (!state.user) { renderAuth(); return; }
  renderApp();
}

// ── AUTH LOGIC ────────────────────────────────────────────
function doLogin(email, pw) {
  if (!email || !pw) { state.authError = "Bitte E-Mail und Passwort eingeben."; render(); return; }
  if (!sbReady) {
    // Fallback: localStorage only
    var saved = localStorage.getItem("vi_user_" + email);
    if (!saved) { state.authError = "Kein Account gefunden. Bitte registriere dich zuerst."; render(); return; }
    var u = JSON.parse(saved);
    if (u.pw !== btoa(pw)) { state.authError = "Falsches Passwort."; render(); return; }
    delete u.pw;
    state.user = u;
    localStorage.setItem("vi_user", JSON.stringify(state.user));
    render(); return;
  }
  state.loading = true; render();
  supabase.auth.signInWithPassword({ email: email, password: pw }).then(function(res) {
    state.loading = false;
    if (res.error) { state.authError = res.error.message; render(); return; }
    var uid = res.data.user.id;
    supabase.from("profiles").select("username").eq("id", uid).single().then(function(pRes) {
      state.user = { id: uid, email: email, username: (pRes.data && pRes.data.username) || email.split("@")[0] };
      localStorage.setItem("vi_user", JSON.stringify(state.user));
      render();
    });
  });
}

function doRegister(email, pw, username) {
  if (!email || !pw || !username) { state.authError = "Bitte alle Felder ausfüllen."; render(); return; }
  if (pw.length < 6) { state.authError = "Passwort muss mindestens 6 Zeichen haben."; render(); return; }
  if (username.length < 2) { state.authError = "Username muss mindestens 2 Zeichen haben."; render(); return; }
  if (!/^[a-z0-9_]+$/.test(username)) { state.authError = "Username: nur Kleinbuchstaben, Zahlen und _."; render(); return; }

  if (!sbReady) {
    // Fallback: localStorage
    var existing = localStorage.getItem("vi_user_" + email);
    if (existing) { state.authError = "Diese E-Mail ist bereits registriert."; render(); return; }
    var u = { id: "local_" + Date.now(), email: email, username: username, pw: btoa(pw) };
    localStorage.setItem("vi_user_" + email, JSON.stringify(u));
    delete u.pw;
    state.user = u;
    localStorage.setItem("vi_user", JSON.stringify(state.user));
    render(); return;
  }
  state.loading = true; render();
  supabase.auth.signUp({ email: email, password: pw }).then(function(res) {
    state.loading = false;
    if (res.error) { state.authError = res.error.message; render(); return; }
    var uid = res.data.user.id;
    supabase.from("profiles").insert({ id: uid, username: username, email: email }).then(function() {
      state.user = { id: uid, email: email, username: username };
      localStorage.setItem("vi_user", JSON.stringify(state.user));
      render();
    });
  });
}

function doLogout() {
  localStorage.removeItem("vi_user");
  state.user = null; state.tab = "heute";
  if (sbReady) supabase.auth.signOut();
  render();
}

    transition: "all .15s"

  if (done) chk.innerHTML = '<span style="color:#fff;font-size:9px;font-weight:800">✓</span>';

  var txt = span({
    fontSize: "12px", color: done ? C.mu : isBand ? "#6B8FFF" : C.tx,

  var wrap = div({ padding: "16px 14px 0" });

  mt.appendChild(div({ fontFamily: "'Bebas Neue'", fontSize: "9px", color: C.mu,

  wrap.appendChild(nav);

  // Day headers
  var hdrs = div({ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: "3px", marginBottom: "3px" });
  DAYS.forEach(function(d) {
    hdrs.appendChild(div({ textAlign: "center", fontFamily: "'Bebas Neue'",
      fontSize: "10px", color: C.mu }, [d]));
  });
  wrap.appendChild(hdrs);

  // Grid
  var dM = daysInMonth(Y, m), off = firstDayOff(Y, m);
  var total = off + dM; while (total % 7) total++;
  var grid = div({ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: "3px" });
  var today = todayStr();

  for (var idx = 0; idx < total; idx++) {
    if (idx < off || idx >= off + dM) { grid.appendChild(div({})); continue; }
    var day = idx - off + 1;
    var ds = Y + "-" + pad(m+1) + "-" + pad(day);
    var t = getTrain(ds), hol = getHol(ds), pub = PH[ds], spec = SE[ds];
    var td = state.logs[ds] || [];
    var allD = t && t.tasks && td.length === t.tasks.length;
    var part = !allD && td.length > 0;
    var isT = ds === today;

    var bg = C.s2, bdr = C.bd, acc = C.mu;
    if (hol) { bg = "#1B3A8C11"; bdr = "#1B3A8C44"; acc = "#3A5ECC"; }
    if (t && !hol) { bg = t.color + "11"; bdr = t.color + "33"; acc = t.color; }
    if (allD) { bg = t.color + "30"; bdr = t.color; }
    if (isT) bdr = C.orl;

    var cell = div({
      borderRadius: "10px", padding: "6px 3px 5px", textAlign: "center",
      minHeight: "52px", background: bg,
      border: (isT ? "2px" : "1px") + " solid " + bdr,
      cursor: "pointer", transition: "transform .1s", position: "relative"
    });
    if (isT) cell.appendChild(div({ position: "absolute", top: "3px", right: "3px",
      width: "4px", height: "4px", borderRadius: "50%", background: C.orl }, []));
    if (pub) cell.appendChild(div({ position: "absolute", top: "3px", left: "3px",
      width: "4px", height: "4px", borderRadius: "50%", background: "#AA2222" }, []));

    cell.appendChild(div({ fontFamily: "'Bebas Neue'", fontSize: "16px",
      color: isT ? C.orl : allD ? acc : C.tx }, [String(day)]));
    if (t) {
      var ic = div({ fontSize: "7px", fontFamily: "'Bebas Neue'", color: acc,
        background: acc + "22", borderRadius: "4px", padding: "1px 3px",
        display: "inline-block", marginTop: "1px" }, [spec ? "★" : t.icon]);
      cell.appendChild(ic);
    }
    if (allD) cell.appendChild(div({ fontSize: "8px", color: acc, marginTop: "1px" }, ["✓"]));
    else if (part) {
      var pb2 = div({ width: "14px", height: "2px", borderRadius: "1px",
        background: C.bd, overflow: "hidden", margin: "2px auto 0" });
      pb2.appendChild(div({ width: (td.length / t.tasks.length * 100) + "%",
        height: "100%", background: acc }, []));
      cell.appendChild(pb2);
    }

    (function(ds) {
      cell.addEventListener("click", function() { state.selDate = ds; render(); });
    })(ds);
    cell.addEventListener("mouseenter", function() { this.style.transform = "scale(.95)"; });
    cell.addEventListener("mouseleave", function() { this.style.transform = "scale(1)"; });
    grid.appendChild(cell);
  }
  wrap.appendChild(grid);
  return wrap;
}

// ── DAY MODAL ─────────────────────────────────────────────
function renderModal() {
  var ds = state.selDate;
  var t = getTrain(ds), pub = PH[ds], spec = SE[ds], hol = getHol(ds);
  var color = t ? t.color : C.mu;
  var td = state.logs[ds] || [];
  var d2 = new Date(ds + "T00:00:00");
  var dn = ["So","Mo","Di","Mi","Do","Fr","Sa"][d2.getDay()];

  var overlay = div({
    position: "fixed", inset: "0", background: "rgba(7,8,15,.92)",
    backdropFilter: "blur(12px)", display: "flex",
    alignItems: "flex-end", justifyContent: "center", zIndex: "100"
  });

  var panel = div({
    background: C.s1, borderRadius: "22px 22px 0 0",
    width: "100%", maxWidth: "500px", maxHeight: "88vh",
    overflowY: "auto", paddingBottom: "40px",
    borderTop: "2px solid " + color,
    animation: "slideUp .22s ease"
  });

  // Add animation
  if (!document.getElementById("modal-anim")) {
    var style = document.createElement("style");
    style.id = "modal-anim";
    style.textContent = "@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}";
    document.head.appendChild(style);
  }

  var hdr = div({ padding: "18px 18px 12px", position: "sticky", top: "0",
    background: C.s1, borderBottom: "1px solid " + C.bd, zIndex: "10" });
  var hrow = div({ display: "flex", justifyContent: "space-between", alignItems: "flex-start" });
  var htitle = div({});
  htitle.appendChild(div({ fontFamily: "'Bebas Neue'", fontSize: "9px", color: C.mu,
    letterSpacing: ".22em" }, [dn + " · " + ds.slice(8) + "." + ds.slice(5,7) + ".2026"]));
  htitle.appendChild(div({ fontFamily: "'Bebas Neue'", fontSize: "21px",
    color: t ? t.color : C.mu, marginTop: "2px" }, [t ? t.label : pub || "Ruhetag"]));
  if (t && t.zeit) htitle.appendChild(div({ fontSize: "11px", color: C.mu, marginTop: "3px" }, [t.zeit]));
  if (spec) htitle.appendChild(div({ fontSize: "11px", color: C.gold, marginTop: "3px" }, [spec]));
  if (hol) htitle.appendChild(div({ fontSize: "11px", color: "#3A5ECC", marginTop: "3px" }, [hol.name + " – Ferientraining"]));
  hrow.appendChild(htitle);

  var xbtn = btn({ background: C.s2, border: "1px solid " + C.bd, color: C.mu,
    borderRadius: "50%", width: "30px", height: "30px",
    fontSize: "16px", flexShrink: "0" }, "×", function() {
    state.selDate = null; render();
  });
  hrow.appendChild(xbtn);
  hdr.appendChild(hrow);

  if (t && t.tasks) {
    var pg = div({ marginTop: "10px", height: "3px", background: C.s3, borderRadius: "2px", overflow: "hidden" });
    pg.appendChild(div({ height: "100%", borderRadius: "2px",
      width: (td.length / t.tasks.length * 100) + "%",
      background: "linear-gradient(90deg," + color + "," + C.orl + ")",
      transition: "width .3s" }, []));
    hdr.appendChild(pg);
    hdr.appendChild(div({ fontSize: "10px", color: C.mu, marginTop: "5px" },
      [td.length + "/" + t.tasks.length + " Aufgaben"]));
  }
  panel.appendChild(hdr);

  var body = div({ padding: "14px 16px 0" });
  if (t && t.tasks) {
    t.tasks.forEach(function(task, i) {
      body.appendChild(renderTaskRow(task, td.indexOf(i) >= 0, ds, i, t.color));
    });
    var ar = div({ display: "flex", gap: "8px", marginTop: "12px" });
    if (td.length === t.tasks.length) {
      var dc = div({ flex: "1", padding: "13px 0", textAlign: "center",
        background: "linear-gradient(135deg," + t.color + "," + C.orl + ")",
        borderRadius: "12px", fontFamily: "'Bebas Neue'", fontSize: "15px",
        color: C.wh }, ["♔ TAG DONE!"]);
      var rst = btn({ padding: "13px 14px", background: C.s2,
        border: "1px solid " + C.bd, borderRadius: "12px",
        color: C.mu, fontSize: "11px" }, "↺", function() {
        state.logs[ds] = []; saveLogs(state.logs); render();
      });
      ar.append(dc, rst);
    } else {
      var ab = btn({ flex: "1", padding: "13px 0", background: C.s2,
        border: "1px solid " + C.bd, borderRadius: "12px",
        fontFamily: "'Bebas Neue'", fontSize: "13px", color: C.mu,
        letterSpacing: ".08em" }, "ALLE ABHAKEN →", function() {
        state.logs[ds] = t.tasks.map(function(_, i) { return i; });
        saveLogs(state.logs); render();
      });
      ar.appendChild(ab);
    }
    body.appendChild(ar);
  } else {
    body.appendChild(div({ textAlign: "center", padding: "32px 0",
      fontFamily: "'Bebas Neue'", fontSize: "16px", color: C.mu },
      [pub ? pub + " – Feiertag" : "Ruhetag – Erhol dich!"]));
  }
  panel.appendChild(body);

  overlay.appendChild(panel);
  overlay.addEventListener("click", function(e) {
    if (e.target === overlay) { state.selDate = null; render(); }
  });
  return overlay;
}

// ── STATS ─────────────────────────────────────────────────
function renderStats() {
  var wrap = div({ padding: "16px 16px 0" });
  var Y = 2026;

  // Streak
  var streak = 0;
  for (var i = 0; i < 365; i++) {
    var d = new Date(); d.setDate(d.getDate() - i);
    var ds = d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate());
    var t = getTrain(ds);
    if (!t || !t.tasks) continue;
    if ((state.logs[ds] || []).length === t.tasks.length) streak++;
    else if (i > 0) break;
  }

  // Monthly
  var months = MN.map(function(n, mi) {
    var dn = 0, tot = 0;
    for (var di = 1; di <= daysInMonth(Y, mi); di++) {
      var ds = Y + "-" + pad(mi+1) + "-" + pad(di);
      var t = getTrain(ds);
      if (t && t.tasks) { tot++; if ((state.logs[ds]||[]).length===t.tasks.length) dn++; }
    }
    return { n: n.slice(0,3), pct: tot ? Math.round(dn/tot*100) : 0 };
  });
  var avg = months.reduce(function(a,m){return a+m.pct;},0)/12;

  // Week
  var wD = 0, wT = 0;
  for (var i = 0; i < 7; i++) {
    var d = new Date(); d.setDate(d.getDate()-i);
    var ds = d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate());
    var t = getTrain(ds);
    if (t && t.tasks) { wT++; if ((state.logs[ds]||[]).length===t.tasks.length) wD++; }
  }
  var score = Math.round(Math.min(100, streak*2.5)*.4 + avg*.4 + (wT?wD/wT*100:0)*.2);

  // Score card
  var sc = div({
    borderRadius: "18px", padding: "22px",
    background: "linear-gradient(135deg," + C.bl + "DD," + C.or + "99)",
    marginBottom: "12px", position: "relative", overflow: "hidden",
    border: "1px solid " + C.or + "33"
  });
  sc.appendChild(div({ fontFamily: "'Bebas Neue'", fontSize: "10px",
    color: "rgba(255,255,255,.65)", letterSpacing: ".3em" },
    ["IMPERIAL SCORE · " + state.user.username.toUpperCase()]));
  var scoreRow = div({ display: "flex", alignItems: "flex-end", gap: "10px", margin: "6px 0 14px" });
  scoreRow.appendChild(div({ fontFamily: "'Bebas Neue'", fontSize: "72px",
    color: C.wh, lineHeight: "1" }, [String(score)]));
  var scoreLabel = div({ paddingBottom: "10px" });
  scoreLabel.appendChild(div({ fontSize: "14px", color: "rgba(255,255,255,.7)" }, ["/100"]));
  scoreLabel.appendChild(div({ fontFamily: "'Bebas Neue'", fontSize: "13px",
    color: C.wh }, [score>=80?"ELITE":score>=60?"STARK":score>=40?"AUFBAU":"BEGINN"]));
  scoreRow.appendChild(scoreLabel);
  sc.appendChild(scoreRow);
  var sGrid = div({ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "8px" });
  [{l:"Streak",v:streak+" Tage"},{l:"Woche",v:wD+"/"+wT},{l:"Ø Saison",v:Math.round(avg)+"%"}]
    .forEach(function(x) {
      var c2 = div({ background: "rgba(255,255,255,.1)", borderRadius: "10px", padding: "9px 12px",
        backdropFilter: "blur(10px)" });
      c2.appendChild(div({ fontSize: "9px", color: "rgba(255,255,255,.55)", marginBottom: "2px" }, [x.l]));
      c2.appendChild(div({ fontFamily: "'Bebas Neue'", fontSize: "20px", color: C.wh }, [x.v]));
      sGrid.appendChild(c2);
    });
  sc.appendChild(sGrid);
  wrap.appendChild(sc);

  // Month chart
  var ch = div({ background: C.s1, borderRadius: "16px", border: "1px solid " + C.bd,
    padding: "16px", marginBottom: "12px" });
  ch.appendChild(div({ fontFamily: "'Bebas Neue'", fontSize: "9px", color: C.mu,
    letterSpacing: ".2em", marginBottom: "12px" }, ["MONATSÜBERSICHT 2026"]));
  var barsWrap = div({ display: "flex", gap: "3px", alignItems: "flex-end", height: "60px" });
  var cm = new Date().getMonth();
  months.forEach(function(m, i) {
    var bh = Math.max(2, m.pct * .58);
    var col = i === cm ? C.or : m.pct > 0 ? C.bl : C.bd;
    var b = div({ flex: "1", display: "flex", flexDirection: "column", alignItems: "center", gap: "2px" });
    var bar = div({ width: "100%", height: bh + "px", background: col, borderRadius: "3px 3px 0 0" });
    bar.title = m.n + ": " + m.pct + "%";
    b.append(bar, div({ fontFamily: "'Bebas Neue'", fontSize: "7px",
      color: i === cm ? C.orl : C.mu }, [m.n]));
    barsWrap.appendChild(b);
  });
  ch.appendChild(barsWrap);
  wrap.appendChild(ch);

  // Data management
  var dm = div({ background: C.s1, borderRadius: "16px", border: "1px solid " + C.bd, padding: "16px" });
  dm.appendChild(div({ fontFamily: "'Bebas Neue'", fontSize: "9px", color: C.mu,
    letterSpacing: ".2em", marginBottom: "12px" }, ["DATENVERWALTUNG"]));
  var lb = localStorage.getItem(SK + "_lb");
  dm.appendChild(div({ fontSize: "11px", color: C.mu, marginBottom: "12px", lineHeight: "1.5" },
    [lb ? "Letztes Backup: " + new Date(lb).toLocaleDateString("de-AT") : "Noch kein Backup erstellt."]));

  var expBtn = btn({ width: "100%", padding: "13px 0",
    background: "linear-gradient(135deg," + C.bl + "," + C.bll + ")",
    color: C.wh, borderRadius: "12px", fontFamily: "'Bebas Neue'",
    fontSize: "14px", letterSpacing: ".1em", marginBottom: "8px" },
    "DATEN EXPORTIEREN (JSON)", function() { exportData(state.user.username); });
  dm.appendChild(expBtn);

  var impLbl = h("label", { style: {
    display: "block", width: "100%", padding: "12px 0", textAlign: "center",
    background: C.s2, border: "1px solid " + C.bd, borderRadius: "12px",
    fontFamily: "'Bebas Neue'", fontSize: "13px", color: C.mu,
    letterSpacing: ".08em", cursor: "pointer", boxSizing: "border-box"
  }});
  impLbl.textContent = "BACKUP IMPORTIEREN";
  var impInp = h("input", { type: "file", accept: ".json", style: { display: "none" } });
  impInp.addEventListener("change", function(e) {
    var f = e.target.files[0];
    if (f) importData(f, function(n) {
      state.logs = loadLogs(); state.prs = loadPRs();
      alert("Backup importiert!"); render();
    });
  });
  impLbl.appendChild(impInp);
  dm.appendChild(impLbl);
  wrap.appendChild(dm);
  return wrap;
}

// ── NAV ───────────────────────────────────────────────────
function renderNav() {
  var nav = div({
    position: "fixed", bottom: "0", left: "50%",
    transform: "translateX(-50%)", width: "100%", maxWidth: "500px",
    background: C.s1 + "EE", borderTop: "1px solid " + C.bd,
    backdropFilter: "blur(20px)", display: "flex", zIndex: "50"
  });
  [["heute","HEUTE"],["kalender","KALENDER"],["stats","STATS"]].forEach(function(pair) {
    var id = pair[0], label = pair[1];
    var active = state.tab === id;
    var b = btn({
      flex: "1", padding: "10px 0 14px", background: "none",
      display: "flex", flexDirection: "column", alignItems: "center", gap: "4px"
    }, "", function() { state.tab = id; state.selDate = null; render(); });
    b.appendChild(div({ width: "4px", height: "4px", borderRadius: "50%",
      background: active ? C.or : "transparent",
      transition: "background .2s", margin: "0 auto" }, []));
    b.appendChild(div({ fontFamily: "'Bebas Neue'", fontSize: "10px",
      letterSpacing: ".12em", color: active ? C.or : C.mu,
      transition: "color .2s" }, [label]));
    nav.appendChild(b);
  });
  return nav;
}

// ── INIT ─────────────────────────────────────────────────
window.addEventListener("load", function() {
  initSupabase();
  render();
});
