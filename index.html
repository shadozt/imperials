function pad(n){return String(n).padStart(2,"0")}
function parseDate(s){var p=s.split("-").map(Number);return new Date(p[0],p[1]-1,p[2])}
function daysUntil(t){var a=parseDate(t),b=new Date();a.setHours(0,0,0,0);b.setHours(0,0,0,0);return Math.ceil((a-b)/864e5)}
function getHol(ds){var d=parseDate(ds);for(var i=0;i<SH.length;i++){if(d>=parseDate(SH[i].start)&&d<=parseDate(SH[i].end))return SH[i];}return null;}

  var ewt=getEffectiveWT();
  return ewt[new Date(parseDate(ds)).getDay()]||null;
}

function getDynPhase(ds){
  var d=parseDate(ds);
  var all=getAllTournaments().slice().sort(function(a,b){return parseDate(a.date_start)-parseDate(b.date_start);});
  for(var i=0;i<all.length;i++){
    var t=all[i];
    var ts=parseDate(t.date_start),te=parseDate(t.date_end);
    var after=new Date(te);after.setDate(after.getDate()+7);
    var taper=new Date(ts);taper.setDate(taper.getDate()-14);
    var peak=new Date(ts);peak.setDate(peak.getDate()-35);
    if(d>=ts&&d<=te) return{name:"TURNIER",color:t.color,sub:t.name,icon:"🏆"};
    if(d>te&&d<=after) return{name:"REGENERATION",color:C.gr,sub:"Erholung nach "+t.name,icon:"💤"};
    if(d>=taper&&d<ts) return{name:"ZUSPITZEN",color:C.red,sub:"Taper für "+t.name,icon:"⚡"};
    if(d>=peak&&d<taper) return{name:"WETTKAMPF PEAK",color:"#CC4422",sub:"Peak-Aufbau: "+t.name,icon:"🎯"};
  }
  // Default Grundlage/Aufbau based on month
  var m=d.getMonth();

function doLogin(email,pw){
  if(!email||!pw){state.authError="Bitte E-Mail und Passwort eingeben.";render();return;}
  var sb=getSB();
  if(!sb){doLocalLogin(email,pw);return;}
  state.loading=true;render();
  sb.auth.signInWithPassword({email:email,password:pw}).then(function(res){
    state.loading=false;
    if(res.error){state.authError=res.error.message;render();return;}
    finishLogin(res.data.user.id,email);
  });
}
function doLocalLogin(email,pw){
  var saved=localStorage.getItem("vi_u_"+email);
  if(!saved){state.authError="Kein Account. Bitte registrieren.";render();return;}
  var u=JSON.parse(saved);
  if(u.pw!==btoa(pw)){state.authError="Falsches Passwort.";render();return;}
  delete u.pw;state.user=u;state.logs=loadLogs();state.tournaments=loadTourneys();render();
}
function finishLogin(uid,email){
  var sb=getSB();
  sb.from("profiles").select("username,avatar_url,username_changed_at").eq("id",uid).single().then(function(pRes){
    var p=pRes.data||{};
    state.user={id:uid,email:email,username:p.username||email.split("@")[0],usernameChangedAt:p.username_changed_at||null};
    state.avatarUrl=p.avatar_url||localStorage.getItem("vi_avatar_"+uid)||null;
    // Load cloud logs
    sb.from("logs").select("date,tasks").eq("user_id",uid).then(function(lRes){
      var logs={};
      if(lRes.data)lRes.data.forEach(function(r){logs[r.date]=r.tasks;});
      var local=loadLogs();
      Object.keys(local).forEach(function(k){if(!logs[k])logs[k]=local[k];});
      state.logs=logs;saveLocal(logs);
      // Load tournaments
      fetchCloudTourneys(uid,function(ts){state.tournaments=ts;render();});
    });
  });
}
function doRegister(email,pw,username){
  if(!email||!pw||!username){state.authError="Alle Felder ausfüllen.";render();return;}
  if(pw.length<6){state.authError="Passwort min. 6 Zeichen.";render();return;}
  if(username.length<2){state.authError="Username min. 2 Zeichen.";render();return;}
  if(!/^[a-z0-9_]+$/.test(username)){state.authError="Username: nur a-z, 0-9, _.";render();return;}
  var sb=getSB();
  if(!sb){doLocalReg(email,pw,username);return;}
  state.loading=true;render();
  sb.auth.signUp({email:email,password:pw}).then(function(res){
    state.loading=false;
    if(res.error){state.authError=res.error.message;render();return;}
    var uid=res.data.user.id;
    sb.from("profiles").insert({id:uid,username:username,email:email}).then(function(){
      state.user={id:uid,email:email,username:username,usernameChangedAt:null};
      state.logs={};state.tournaments=[];state.avatarUrl=null;render();
    });
  });
}
function doLocalReg(email,pw,username){
  if(localStorage.getItem("vi_u_"+email)){state.authError="E-Mail bereits registriert.";render();return;}
  var u={id:"local_"+Date.now(),email:email,username:username,pw:btoa(pw)};
  localStorage.setItem("vi_u_"+email,JSON.stringify(u));delete u.pw;
  state.user=u;state.logs={};state.tournaments=[];state.avatarUrl=null;render();
}
function doLogout(){
  if(!confirm("Ausloggen?"))return;
  localStorage.removeItem("vi_offline_session");
  localStorage.removeItem("vi_offline_name");
  state.user=null;state.tab="heute";state.profileOpen=false;state.avatarUrl=null;
  var sb=getSB();if(sb)sb.auth.signOut();render();
}

// ── CALENDAR ─────────────────────────────────────────────────
function renderCalendar(){
  var wrap=d({padding:"16px 14px 0"});var Y=2026;var m=state.month;
  var nav=d({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"});
  nav.appendChild(btn({background:C.s2,border:"1px solid "+C.bd,color:C.tx,borderRadius:"10px",padding:"8px 16px",fontSize:"18px"},"‹",function(){state.month=Math.max(0,state.month-1);render();}));
  var mt=d({textAlign:"center"});
  mt.appendChild(d({fontFamily:"'Bebas Neue'",fontSize:"24px",color:C.tx},[MN[m]]));
  mt.appendChild(d({fontFamily:"'Bebas Neue'",fontSize:"9px",color:C.mu,letterSpacing:".2em"},["2026"]));
  nav.appendChild(mt);
  nav.appendChild(btn({background:C.s2,border:"1px solid "+C.bd,color:C.tx,borderRadius:"10px",padding:"8px 16px",fontSize:"18px"},"›",function(){state.month=Math.min(11,state.month+1);render();}));
  wrap.appendChild(nav);
  // Build dynamic SE for this month
  var allT=getAllTournaments();
  var dynSE=Object.assign({},SE);
  allT.forEach(function(t){
    if(!t.is_official){
      var s=parseDate(t.date_start),e=parseDate(t.date_end);
      for(var d2=new Date(s);d2<=e;d2.setDate(d2.getDate()+1)){
        var ds2=d2.getFullYear()+"-"+pad(d2.getMonth()+1)+"-"+pad(d2.getDate());
        dynSE[ds2]="🏅 "+t.name;
      }
    }
  });
  var hdrs=d({display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"3px",marginBottom:"3px"});
  DAYS.forEach(function(dd){hdrs.appendChild(d({textAlign:"center",fontFamily:"'Bebas Neue'",fontSize:"10px",color:C.mu},[dd]));});
  wrap.appendChild(hdrs);
  var dM=daysInMonth(Y,m),off=firstDayOff(Y,m);
  var total=off+dM;while(total%7)total++;
  var grid=d({display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"3px"});
  var today=todayStr();
  for(var idx=0;idx<total;idx++){
    if(idx<off||idx>=off+dM){grid.appendChild(d({}));continue;}
    var day=idx-off+1;
    var ds=Y+"-"+pad(m+1)+"-"+pad(day);
    var t=getTrain(ds),hol=getHol(ds),pub=PH[ds],spec=dynSE[ds];
    var ph=getDynPhase(ds);
    var td6=state.logs[ds]||[];
    var allD=t&&t.tasks&&td6.length===t.tasks.length;
    var part=!allD&&td6.length>0;
    var isT=ds===today;
    var bg=C.s2,bdr=C.bd,acc=C.mu;
    if(ph&&ph.name==="TURNIER"){bg=ph.color+"25";bdr=ph.color;acc=ph.color;}
    else if(hol){bg="#1B3A8C11";bdr="#1B3A8C44";acc="#3A5ECC";}
    else if(t&&!hol){bg=t.color+"11";bdr=t.color+"33";acc=t.color;}
    if(allD){bg=(t?t.color:acc)+"30";bdr=t?t.color:acc;}
    if(isT)bdr=C.orl;
    var cell=d({borderRadius:"10px",padding:"6px 3px 5px",textAlign:"center",minHeight:"52px",
      background:bg,border:(isT?"2px":"1px")+" solid "+bdr,cursor:"pointer",
      transition:"transform .1s",position:"relative"});
    if(isT)cell.appendChild(d({position:"absolute",top:"3px",right:"3px",width:"4px",height:"4px",borderRadius:"50%",background:C.orl},[]));
    if(pub)cell.appendChild(d({position:"absolute",top:"3px",left:"3px",width:"4px",height:"4px",borderRadius:"50%",background:"#AA2222"},[]));
    cell.appendChild(d({fontFamily:"'Bebas Neue'",fontSize:"16px",color:isT?C.orl:allD?acc:C.tx},[String(day)]));
    if(t){
      var ic=d({fontSize:"7px",fontFamily:"'Bebas Neue'",color:acc,background:acc+"22",borderRadius:"4px",
        padding:"1px 3px",display:"inline-block",marginTop:"1px"},[spec?"🏆":t.icon]);
      cell.appendChild(ic);
    }
    if(allD)cell.appendChild(d({fontSize:"8px",color:acc,marginTop:"1px"},["✓"]));
    else if(part){
      var pb2=d({width:"14px",height:"2px",borderRadius:"1px",background:C.bd,overflow:"hidden",margin:"2px auto 0"});
      pb2.appendChild(d({width:(td6.length/t.tasks.length*100)+"%",height:"100%",background:acc},[]));
      cell.appendChild(pb2);
    }
    (function(ds2){cell.addEventListener("click",function(){state.selDate=ds2;render();});})(ds);
    cell.addEventListener("mouseenter",function(){this.style.transform="scale(.95)";});
    cell.addEventListener("mouseleave",function(){this.style.transform="scale(1)";});
    grid.appendChild(cell);
  }
  wrap.appendChild(grid);return wrap;
}

      letterSpacing:".08em",border:"none"},"+ HINZUFÜGEN",
      function(){state.addTourneyOpen=true;state.editTourney=null;render();})
  ]));

  var all=OFFICIAL.concat(state.tournaments||[]);
  all.sort(function(a,b){return parseDate(a.date_start)-parseDate(b.date_start);});

  if(all.length===0){
    wrap.appendChild(d({background:C.s1,borderRadius:"14px",border:"1px solid "+C.bd,

      badges.appendChild(offBadge);
    }
    if(isDuring){
      badges.appendChild(d({background:t.color+"22",border:"1px solid "+t.color,borderRadius:"4px",
        padding:"2px 7px",fontSize:"8px",fontFamily:"'Bebas Neue'",color:t.color,letterSpacing:".1em"},["JETZT LIVE"]));
    } else if(isPast){
      badges.appendChild(d({background:"#ffffff08",border:"1px solid "+C.bd,borderRadius:"4px",
        padding:"2px 7px",fontSize:"8px",fontFamily:"'Bebas Neue'",color:C.mu,letterSpacing:".1em"},["ABSOLVIERT ✓"]));

    left.appendChild(d({fontFamily:"'Bebas Neue'",fontSize:"17px",color:C.tx,letterSpacing:".02em"},[t.name]));

      right.appendChild(d({fontSize:"24px"},["🏆"]));

      right.appendChild(d({fontFamily:"'Bebas Neue'",fontSize:"8px",color:C.mu,letterSpacing:".15em"},["TAGE HER"]));

    row.appendChild(right);

    padding:"12px 14px",marginBottom:"12px"},[
    d({fontFamily:"'Bebas Neue'",fontSize:"9px",color:C.mu,letterSpacing:".18em",marginBottom:"6px"},["AUTOMATISCHE PERIODISIERUNG"]),
    d({fontSize:"11px",color:C.mu,lineHeight:"1.5"},
      ["Für jedes Turnier passt sich dein Trainingsplan automatisch an: 5 Wochen Peak-Phase → 2 Wochen Taper → Turnier → 1 Woche Regeneration."])
  ]));
  return wrap;
}

  var hdr=d({padding:"18px 18px 14px",borderBottom:"1px solid "+C.bd,display:"flex",

  hdr.appendChild(d({fontFamily:"'Bebas Neue'",fontSize:"18px",color:C.tx},[editing?"TURNIER BEARBEITEN":"TURNIER HINZUFÜGEN"]));
  hdr.appendChild(btn({background:C.s2,border:"1px solid "+C.bd,color:C.mu,borderRadius:"50%",
    width:"30px",height:"30px",fontSize:"16px"},"×",
    function(){state.addTourneyOpen=false;state.editTourney=null;render();}));
  panel.appendChild(hdr);
  var body=d({padding:"20px 18px 0"});
  var nameI=inp("text","z.B. Bundesliga Wien",editing?editing.name:"");
  body.appendChild(lbl("NAME")); body.appendChild(nameI);
  var startI=inp("date","",editing?editing.date_start:"");
  body.appendChild(lbl("STARTDATUM")); body.appendChild(startI);
  var endI=inp("date","",editing?editing.date_end:"");
  body.appendChild(lbl("ENDDATUM")); body.appendChild(endI);
  var locI=inp("text","Stadt / Land",editing?editing.location:"");
  body.appendChild(lbl("ORT (OPTIONAL)")); body.appendChild(locI);
  // Color picker
  body.appendChild(lbl("FARBE"));
  var selectedColor=editing?editing.color:TCOLORS[0];
  var colorWrap=d({display:"flex",gap:"8px",marginBottom:"16px",flexWrap:"wrap"});
  var colorBtns={};
  TCOLORS.forEach(function(col){
    var cb=d({width:"32px",height:"32px",borderRadius:"50%",background:col,cursor:"pointer",
      border:"3px solid "+(col===selectedColor?"#fff":"transparent"),
      boxShadow:col===selectedColor?"0 0 0 2px "+col:"none",transition:"all .15s"});
    cb.addEventListener("click",function(){
      selectedColor=col;
      Object.keys(colorBtns).forEach(function(c){
        colorBtns[c].style.border="3px solid "+(c===col?"#fff":"transparent");
        colorBtns[c].style.boxShadow=c===col?"0 0 0 2px "+c:"none";
      });
    });
    colorBtns[col]=cb;colorWrap.appendChild(cb);
  });
  body.appendChild(colorWrap);
  var errD=d({fontSize:"12px",color:"#FF6B6B",marginBottom:"8px",display:"none"});
  body.appendChild(errD);
  body.appendChild(btn({width:"100%",padding:"13px 0",
    background:"linear-gradient(135deg,"+C.or+","+C.orl+")",color:C.wh,borderRadius:"12px",
    fontFamily:"'Bebas Neue'",fontSize:"16px",letterSpacing:".08em"},
    editing?"SPEICHERN":"TURNIER ERSTELLEN",function(){
      var name=(nameI.value||"").trim();
      var start=(startI.value||"").trim();
      var end=(endI.value||"").trim()||start;
      var loc=(locI.value||"").trim();
      if(!name||!start){errD.textContent="Name und Startdatum sind Pflicht.";errD.style.display="block";return;}
      if(start>end){errD.textContent="Enddatum muss nach Startdatum liegen.";errD.style.display="block";return;}
      var t={
        id:editing?editing.id:null,
        name:name,date_start:start,date_end:end,
        location:loc,color:selectedColor,is_official:false,
        user_id:state.user?state.user.id:null
      };
      saveCloudTourney(t,function(){state.addTourneyOpen=false;state.editTourney=null;render();});
    }));
  panel.appendChild(body);
  overlay.appendChild(panel);
  overlay.addEventListener("click",function(e){
    if(e.target===overlay){state.addTourneyOpen=false;state.editTourney=null;render();}
  });
  return overlay;
}

// ── STATS ────────────────────────────────────────────────────
function renderStats(){
  var wrap=d({padding:"16px 16px 0"});var Y=2026;
  var streak=0;
  for(var i=0;i<365;i++){
    var dobj=new Date();dobj.setDate(dobj.getDate()-i);
    var ds=dobj.getFullYear()+"-"+pad(dobj.getMonth()+1)+"-"+pad(dobj.getDate());
    var t=getTrain(ds);
    if(!t||!t.tasks)continue;
    if((state.logs[ds]||[]).length===t.tasks.length)streak++;
    else if(i>0)break;
  }
  var months=MN.map(function(n,mi){
    var dn4=0,tot=0;
    for(var di=1;di<=daysInMonth(Y,mi);di++){
      var ds2=Y+"-"+pad(mi+1)+"-"+pad(di);var t2=getTrain(ds2);
      if(t2&&t2.tasks){tot++;if((state.logs[ds2]||[]).length===t2.tasks.length)dn4++;}
    }
    return{n:n.slice(0,3),pct:tot?Math.round(dn4/tot*100):0};
  });
  var avg=months.reduce(function(a,m){return a+m.pct;},0)/12;
  var wD=0,wT=0;
  for(var i=0;i<7;i++){
    var dobj=new Date();dobj.setDate(dobj.getDate()-i);
    var ds=dobj.getFullYear()+"-"+pad(dobj.getMonth()+1)+"-"+pad(dobj.getDate());
    var t=getTrain(ds);
    if(t&&t.tasks){wT++;if((state.logs[ds]||[]).length===t.tasks.length)wD++;}
  }
  var score=Math.round(Math.min(100,streak*2.5)*.4+avg*.4+(wT?wD/wT*100:0)*.2);
  var sc=d({borderRadius:"18px",padding:"22px",background:"linear-gradient(135deg,"+C.bl+"DD,"+C.or+"99)",
    marginBottom:"12px",border:"1px solid "+C.or+"33"});
  sc.appendChild(d({fontFamily:"'Bebas Neue'",fontSize:"10px",color:"rgba(255,255,255,.65)",letterSpacing:".3em"},
    ["IMPERIAL SCORE · "+state.user.username.toUpperCase()]));
  var sr=d({display:"flex",alignItems:"flex-end",gap:"10px",margin:"6px 0 14px"});
  sr.appendChild(d({fontFamily:"'Bebas Neue'",fontSize:"72px",color:C.wh,lineHeight:"1"},[String(score)]));
  var sl=d({paddingBottom:"10px"});
  sl.appendChild(d({fontSize:"14px",color:"rgba(255,255,255,.7)"},["/100"]));
  sl.appendChild(d({fontFamily:"'Bebas Neue'",fontSize:"13px",color:C.wh},
    [score>=80?"ELITE":score>=60?"STARK":score>=40?"AUFBAU":"BEGINN"]));
  sr.appendChild(sl);sc.appendChild(sr);
  var sg=d({display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px"});
  [{l:"Streak",v:streak+" Tage"},{l:"Woche",v:wD+"/"+wT},{l:"Ø Saison",v:Math.round(avg)+"%"}].forEach(function(x){
    var c2=d({background:"rgba(255,255,255,.1)",borderRadius:"10px",padding:"9px 12px"});
    c2.appendChild(d({fontSize:"9px",color:"rgba(255,255,255,.55)",marginBottom:"2px"},[x.l]));
    c2.appendChild(d({fontFamily:"'Bebas Neue'",fontSize:"20px",color:C.wh},[x.v]));
    sg.appendChild(c2);
  });
  sc.appendChild(sg);wrap.appendChild(sc);
  var ch=d({background:C.s1,borderRadius:"16px",border:"1px solid "+C.bd,padding:"16px",marginBottom:"12px"});
  ch.appendChild(d({fontFamily:"'Bebas Neue'",fontSize:"9px",color:C.mu,letterSpacing:".2em",marginBottom:"12px"},["MONATSÜBERSICHT 2026"]));
  var bw=d({display:"flex",gap:"3px",alignItems:"flex-end",height:"60px"});
  var cm=new Date().getMonth();
  months.forEach(function(m,i){
    var bh=Math.max(2,m.pct*.58);var col=i===cm?C.or:m.pct>0?C.bl:C.bd;
    var b2=d({flex:"1",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px"});
    var bar=d({width:"100%",height:bh+"px",background:col,borderRadius:"3px 3px 0 0"});
    bar.title=m.n+": "+m.pct+"%";
    b2.append(bar,d({fontFamily:"'Bebas Neue'",fontSize:"7px",color:i===cm?C.orl:C.mu},[m.n]));
    bw.appendChild(b2);
  });
  ch.appendChild(bw);wrap.appendChild(ch);
  var dm=d({background:C.s1,borderRadius:"16px",border:"1px solid "+C.bd,padding:"16px"});
  dm.appendChild(d({fontFamily:"'Bebas Neue'",fontSize:"9px",color:C.mu,letterSpacing:".2em",marginBottom:"12px"},["DATENVERWALTUNG"]));
  var lb2=localStorage.getItem(SK+"_lb");
  dm.appendChild(d({fontSize:"11px",color:C.mu,marginBottom:"12px",lineHeight:"1.5"},
    [lb2?"Letztes Backup: "+new Date(lb2).toLocaleDateString("de-AT"):"Noch kein Backup."]));
  dm.appendChild(btn({width:"100%",padding:"13px 0",background:"linear-gradient(135deg,"+C.bl+","+C.bll+")",
    color:C.wh,borderRadius:"12px",fontFamily:"'Bebas Neue'",fontSize:"14px",
    letterSpacing:".1em",marginBottom:"8px"},"DATEN EXPORTIEREN (JSON)",
    function(){exportData(state.user.username);}));
  var il=h("label",{style:{display:"block",width:"100%",padding:"12px 0",textAlign:"center",
    background:C.s2,border:"1px solid "+C.bd,borderRadius:"12px",fontFamily:"'Bebas Neue'",
    fontSize:"13px",color:C.mu,letterSpacing:".08em",cursor:"pointer",boxSizing:"border-box"}});
  il.textContent="BACKUP IMPORTIEREN";
  var ii=h("input",{type:"file",accept:".json",style:{display:"none"}});
  ii.addEventListener("change",function(e){var f=e.target.files[0];
    if(f)importData(f,function(n){state.logs=loadLogs();alert("Backup importiert!");render();});});
  il.appendChild(ii);dm.appendChild(il);wrap.appendChild(dm);return wrap;
}

// ── NAV ──────────────────────────────────────────────────────
function renderNav(){
  var nav=d({position:"fixed",bottom:"0",left:"50%",transform:"translateX(-50%)",
    width:"100%",maxWidth:"500px",background:C.s1+"EE",borderTop:"1px solid "+C.bd,
    backdropFilter:"blur(20px)",display:"flex",zIndex:"50"});
  [["heute","HEUTE","📅"],["kalender","KAL","🗓"],["turniere","TURNIERE","🏆"],["stats","STATS","📊"]].forEach(function(pair){
    var id=pair[0],label=pair[1],act=state.tab===id;
    var b=btn({flex:"1",padding:"10px 0 14px",background:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"},"",
      function(){state.tab=id;state.selDate=null;render();});
    b.appendChild(d({width:"4px",height:"4px",borderRadius:"50%",background:act?C.or:"transparent",
      transition:"background .2s",margin:"0 auto"},[]));
    b.appendChild(d({fontFamily:"'Bebas Neue'",fontSize:"9px",letterSpacing:".1em",
      color:act?C.or:C.mu,transition:"color .2s"},[label]));
    nav.appendChild(b);
  });
  return nav;
}

// ── INIT ─────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded",function(){
  var sb=getSB();
  // Check for offline session first
  var offlineSession=localStorage.getItem("vi_offline_session");
  if(sb){
    sb.auth.getSession().then(function(res){
      if(res.data&&res.data.session){
        finishLogin(res.data.session.user.id,res.data.session.user.email);
      } else if(offlineSession){
        // Restore offline session
        state.user={id:"offline",email:"",username:localStorage.getItem("vi_offline_name")||"Trainer"};
        state.logs=loadLogs();state.tournaments=loadTourneys();
        state.avatarUrl=localStorage.getItem("vi_avatar_offline")||null;
        render();
      } else {render();}
    });
  } else if(offlineSession){
    state.user={id:"offline",email:"",username:localStorage.getItem("vi_offline_name")||"Trainer"};
    state.logs=loadLogs();state.tournaments=loadTourneys();
    state.avatarUrl=localStorage.getItem("vi_avatar_offline")||null;
    render();
  } else {render();}
});
